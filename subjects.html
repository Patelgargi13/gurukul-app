<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gurukul — Subjects</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#e50914;--bg:#141414;--card:#1f1f1f;--border:#2a2a2a}
html,body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;min-height:100vh}
.nav{display:flex;align-items:center;gap:28px;padding:0 60px;height:68px;background:rgba(0,0,0,0.95);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.nlogo{font-family:'Bebas Neue',cursive;font-size:30px;color:var(--red);letter-spacing:2px;text-decoration:none}
.nlinks{display:flex;gap:18px;list-style:none}
.nlinks a{color:#e5e5e5;text-decoration:none;font-size:13px;transition:color .15s}
.nlinks a:hover{color:#fff}
.nlinks .act a{color:#fff;font-weight:700}
.nav-av{margin-left:auto;width:32px;height:32px;border-radius:4px;background:linear-gradient(135deg,var(--red),#ff6b6b);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}

.hero-sub{padding:60px 60px 40px;background:linear-gradient(180deg,rgba(229,9,20,0.08) 0%,transparent 100%)}
.hero-sub h1{font-family:'Bebas Neue',cursive;font-size:clamp(40px,5vw,64px);letter-spacing:2px;margin-bottom:10px}
.hero-sub p{color:#999;font-size:15px;max-width:500px}

.subject-tabs{display:flex;gap:10px;padding:0 60px 32px;flex-wrap:wrap}
.stab{padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1px solid var(--border);color:#999}
.stab:hover{color:#fff;border-color:#555}
.stab.on{background:var(--red);color:#fff;border-color:var(--red)}

.content{padding:0 60px 80px}
.subject-section{margin-bottom:56px}
.sec-header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.sec-icon{font-size:32px}
.sec-title{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:1px}
.sec-count{font-size:13px;color:#666;margin-left:auto}
.sec-progress{display:flex;align-items:center;gap:10px;font-size:12px;color:#46d369}
.sec-pbar{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.sec-pfill{height:100%;background:#46d369;border-radius:2px}

.chapters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

.chcard{background:var(--card);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid transparent}
.chcard:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.6);border-color:rgba(255,255,255,0.1)}
.chcard-thumb{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.chcard-bg{position:absolute;inset:0}
.chcard-icon{position:relative;z-index:1;font-size:40px}
.chcard-scrim{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,0.7) 0%,transparent 60%);z-index:2}
.chcard-ch{position:absolute;bottom:8px;left:10px;z-index:3;font-size:10px;font-weight:700;color:rgba(255,255,255,0.8);letter-spacing:1.5px;text-transform:uppercase}
.chcard-done{position:absolute;top:8px;right:8px;z-index:3;width:22px;height:22px;background:#46d369;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.chcard.completed .chcard-done{opacity:1}
.chcard-prog{height:3px;background:#333}
.chcard-progfill{height:100%;background:var(--red);transition:width .3s}
.chcard-info{padding:12px 14px}
.chcard-title{font-size:13px;font-weight:700;margin-bottom:6px;line-height:1.35}
.chcard-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:#777}
.chcard-diff{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.diff-easy{color:#46d369;background:rgba(70,211,105,0.1)}
.diff-medium{color:#ffaa00;background:rgba(255,170,0,0.1)}
.diff-hard{color:#ff6b6b;background:rgba(229,9,20,0.1)}
.chcard-play{display:flex;align-items:center;gap:5px;margin-top:8px;color:var(--red);font-size:12px;font-weight:600;opacity:0;transition:opacity .2s}
.chcard:hover .chcard-play{opacity:1}

@media(max-width:768px){
  .nav{padding:0 18px}.nlinks{display:none}
  .hero-sub,.content,.subject-tabs{padding-left:18px;padding-right:18px}
  .chapters-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
}
</style>

function filterSub(el, key) {
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  render(key);
}

function render(filter) {
  const cont = document.getElementById('content');
  cont.innerHTML = '';
  for (const [key, subj] of Object.entries(SUBJECTS)) {
    if (filter !== 'all' && filter !== key) continue;
    const done = subj.chapters.filter(c=>c.p===100).length;
    const total = subj.chapters.length;
    const avgProg = Math.round(subj.chapters.reduce((a,c)=>a+c.p,0)/total);
    const sec = document.createElement('div');
    sec.className = 'subject-section';
    sec.id = 'sec-'+key;
    sec.innerHTML = `
      <div class="sec-header">
        <div class="sec-icon">${subj.icon}</div>
        <div class="sec-title">${subj.label}</div>
        <div class="sec-progress">
          <span>${avgProg}% done</span>
          <div class="sec-pbar"><div class="sec-pfill" style="width:${avgProg}%"></div></div>
        </div>
        <div class="sec-count">${total} chapters · ${done} completed</div>
      </div>
      <div class="chapters-grid" id="grid-${key}"></div>`;
    cont.appendChild(sec);
    const grid = document.getElementById('grid-'+key);
    subj.chapters.forEach((c, i) => {
      const card = document.createElement('div');
      card.className = `chcard${c.p===100?' completed':''}`;
      card.innerHTML = `
        <div class="chcard-thumb">
          <div class="chcard-bg" style="background:${c.g}"></div>
          <div class="chcard-icon">${c.i}</div>
          <div class="chcard-scrim"></div>
          <div class="chcard-ch">${c.ch}</div>
          <div class="chcard-done"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        </div>
        ${c.p>0?`<div class="chcard-prog"><div class="chcard-progfill" style="width:${c.p}%"></div></div>`:''}
        <div class="chcard-info">
          <div class="chcard-title">${c.t}</div>
          <div class="chcard-meta">
            <span class="chcard-diff diff-${c.dif.toLowerCase()}">${c.dif}</span>
            <span>${c.dur}</span>
          </div>
          <div class="chcard-play">▶ Watch Now</div>
        </div>`;
      card.addEventListener('click', () => {
        window.location.href = `watch.html?subj=${key}&idx=${i}`;
      });
      grid.appendChild(card);
    });
  }
}

render('all');
